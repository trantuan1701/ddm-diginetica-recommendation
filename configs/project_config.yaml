project:
  name: ddm-diginetica-recommendation
  description: Course-facing DDM analytics layer over inherited recommender artifacts.

paths:
  raw_interactions_path: data/raw/diginetica/train-item-views.csv
  raw_products_path: data/raw/diginetica/products.csv
  raw_product_categories_path: data/raw/diginetica/product-categories.csv
  raw_purchases_path: data/raw/diginetica/train-purchases.csv
  raw_queries_path: data/raw/diginetica/train-queries.csv
  raw_clicks_path: data/raw/diginetica/train-clicks.csv

registry:
  tracking_uri: ""
  dagshub_repo_owner: lytlong.pers
  dagshub_repo_name: recsys-group-project
  dagshub_username_env_var: DAGSHUB_USERNAME
  dagshub_token_env_var: DAGSHUB_USER_TOKEN
  model_name: recsys-serving
  model_alias: Production
  model_version: ""
  artifact_path: registered_model

inheritance:
  top_k: 20
  inherited_root: data/inherited/recsys
  test_examples_path: ""
  train_examples_path: ""
  item_vocab_path: ""

outputs:
  processed_root: data/processed
  mart_root: data/mart

metric_framing:
  native_metrics:
    - HR@20
    - MRR@20
  ctr_proxy_definition: CTR Proxy@20 is Hit Rate@20 in business language, not real CTR.
  revenue_proxy_requires_price: true
  price_proxy_formula: price = 2^pricelog2 - 1
  revenue_claim_limit: Captured GMV and revenue-weighted HR are offline proxies, not real revenue uplift.

raw_tables:
  product_categories:
    path: data/raw/diginetica/product-categories.csv
    grain: one row per item-category assignment
  products:
    path: data/raw/diginetica/products.csv
    grain: one row per product/item
  item_views:
    path: data/raw/diginetica/train-item-views.csv
    grain: one row per session item view
  purchases:
    path: data/raw/diginetica/train-purchases.csv
    grain: one row per purchased item in an order/session
  queries:
    path: data/raw/diginetica/train-queries.csv
    grain: one row per search query event
  clicks:
    path: data/raw/diginetica/train-clicks.csv
    grain: one row per clicked query result item
